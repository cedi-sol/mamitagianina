<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi mamita Gianina 💖</title>

    <style>

        :root {
            --accent-color: #ff4f8b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            width: 100%;
            height: 100vh;

            overflow: hidden;

            font-family: Arial, sans-serif;

            background:
            radial-gradient(circle at top,
            #3b0a57 0%,
            #120018 25%,
            #05010d 55%,
            #000000 100%);

            background-attachment: fixed;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ESPACIO */

        .space-bg {

            position: absolute;

            width: 100%;
            height: 100%;

            overflow: hidden;

            z-index: 0;
        }

        /* NEBULOSAS */

        .nebula {

            position: absolute;

            border-radius: 50%;

            filter: blur(80px);

            opacity: .35;

            animation:
            nebulaMove 18s ease-in-out infinite;
        }

        .nebula1 {

            width: 400px;
            height: 400px;

            background: #6f00ff;

            top: -100px;
            left: -100px;
        }

        .nebula2 {

            width: 350px;
            height: 350px;

            background: #00c3ff;

            bottom: -80px;
            right: -80px;

            animation-delay: 4s;
        }

        .nebula3 {

            width: 300px;
            height: 300px;

            background: #ff00aa;

            top: 40%;
            left: 50%;

            transform: translate(-50%, -50%);
        }

        /* GALAXIA */

        .galaxy {

            position: absolute;

            width: 600px;
            height: 600px;

            border-radius: 50%;

            background:
            radial-gradient(circle,
            rgba(255,255,255,0.12),
            rgba(255,0,255,0.08),
            transparent 70%);

            top: 50%;
            left: 50%;

            transform: translate(-50%, -50%);

            filter: blur(20px);

            animation:
            rotateGalaxy 30s linear infinite;
        }

        .container {

            position: relative;

            width: 100%;
            height: 100%;

            z-index: 2;
        }

        /* TITULO */

        .Para_Mamá {

            position: absolute;

            top: 4%;
            width: 100%;

            text-align: center;

            color: white;

            font-size: 3rem;
            font-weight: bold;

            z-index: 100;

            text-shadow:
            0 0 10px #ff66b3,
            0 0 20px #ff3399,
            0 0 40px #ff3399;

            animation:
            fadeIn 2s ease;
        }

        /* FOTO */

        .photo-frame {

            position: absolute;

            top: 35%;
            left: 50%;

            transform: translate(-50%, -50%);

            width: 300px;
            height: 400px;

            border-radius: 30px;

            overflow: hidden;

            z-index: 50;

            border: 4px solid rgba(255,255,255,0.15);

            box-shadow:
            0 0 20px #ff4da6,
            0 0 50px rgba(255,0,128,0.6),
            0 0 100px rgba(255,0,128,0.3);

            animation:
            floatPhoto 5s ease-in-out infinite;

            backdrop-filter: blur(8px);
        }

        .photo-frame img {

            width: 100%;
            height: 100%;

            object-fit: cover;

            transition: opacity 1.2s ease;

            animation:
            imageZoom 8s ease-in-out infinite,
            imageFade 8s ease-in-out infinite;
        }

        .photo-glow {

            position: absolute;

            inset: 0;

            background:
            linear-gradient(
            135deg,
            rgba(255,255,255,0.15),
            transparent,
            rgba(255,105,180,0.2)
            );

            z-index: 5;

            pointer-events: none;
        }

        /* ESTRELLAS */

        .stars {

            position: absolute;

            width: 100%;
            height: 100%;
        }

        .star {

            position: absolute;

            background: white;

            border-radius: 50%;

            animation:
            twinkle var(--duration) infinite ease-in-out;
        }

        /* ESTRELLAS FUGACES */

        .shooting-star {

            position: absolute;

            width: 180px;
            height: 2px;

            background:
            linear-gradient(
            to right,
            white,
            transparent);

            border-radius: 50%;

            opacity: 0;

            transform: rotate(-35deg);

            animation:
            shooting 4s linear infinite;
        }

        /* FLORES */

        .garden {

            position: absolute;

            bottom: 0;

            width: 100%;
            height: 55%;

            display: flex;
            justify-content: center;
            align-items: flex-end;

            z-index: 20;
        }

        .flower-container {

            display: flex;

            gap: 70px;

            align-items: flex-end;
        }

        .flower {

            width: 180px;
            height: 360px;

            animation:
            sway 4s ease-in-out infinite;

            transform-origin: bottom center;

            filter:
            drop-shadow(0 0 10px #ff4da6)
            drop-shadow(0 0 25px rgba(255,0,128,0.5));
        }

        /* PASTO */

        .grass {

            position: absolute;

            bottom: 0;

            width: 100%;
            height: 180px;

            z-index: 2;
        }

        .blade {

            position: absolute;

            bottom: -20px;

            width: 14px;

            background:
            linear-gradient(to top,
            #0b7a15,
            #39ff5a);

            border-radius: 50px 50px 0 0;

            animation:
            grassMove 4s ease-in-out infinite;
        }

        /* PARTICULAS */

        .particle {

            position: absolute;

            width: 4px;
            height: 4px;

            background: #ff99cc;

            border-radius: 50%;

            box-shadow:
            0 0 12px #ff66aa;

            animation:
            particleFloat 6s linear infinite;
        }

        /* CORAZONES */

        .heart {

            position: absolute;

            color: var(--accent-color);

            text-shadow:
            0 0 15px hotpink;

            animation:
            float 5s linear forwards;

            pointer-events: none;

            z-index: 999;
        }

        /* ANIMACIONES */

        @keyframes fadeIn {

            from {

                opacity: 0;

                transform: translateY(-30px);
            }

            to {

                opacity: 1;

                transform: translateY(0);
            }
        }

        @keyframes sway {

            0%,100% {

                transform: rotate(-4deg);
            }

            50% {

                transform: rotate(4deg);
            }
        }

        @keyframes twinkle {

            0%,100% {

                opacity: .2;

                transform: scale(1);
            }

            50% {

                opacity: 1;

                transform: scale(1.7);
            }
        }

        @keyframes float {

            0% {

                transform: translateY(0) rotate(0deg);

                opacity: 1;
            }

            100% {

                transform: translateY(-110vh) rotate(360deg);

                opacity: 0;
            }
        }

        @keyframes particleFloat {

            0% {

                transform: translateY(0);

                opacity: 0;
            }

            20% {

                opacity: 1;
            }

            100% {

                transform: translateY(-120vh);

                opacity: 0;
            }
        }

        @keyframes grassMove {

            0%,100% {

                transform: rotate(-4deg);
            }

            50% {

                transform: rotate(4deg);
            }
        }

        @keyframes floatPhoto {

            0%,100% {

                transform:
                translate(-50%, -50%)
                translateY(0px);
            }

            50% {

                transform:
                translate(-50%, -50%)
                translateY(-10px);
            }
        }

        @keyframes imageZoom {

            0% {

                transform: scale(1);
            }

            50% {

                transform: scale(1.08);
            }

            100% {

                transform: scale(1);
            }
        }

        @keyframes imageFade {

            0% {

                opacity: .92;
            }

            50% {

                opacity: 1;
            }

            100% {

                opacity: .92;
            }
        }

        @keyframes shooting {

            0% {

                transform:
                translateX(0)
                translateY(0)
                rotate(-35deg);

                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            100% {

                transform:
                translateX(-120vw)
                translateY(60vh)
                rotate(-35deg);

                opacity: 0;
            }
        }

        @keyframes nebulaMove {

            0%,100% {

                transform:
                scale(1)
                translateY(0px);
            }

            50% {

                transform:
                scale(1.1)
                translateY(-30px);
            }
        }

        @keyframes rotateGalaxy {

            from {

                transform:
                translate(-50%,-50%)
                rotate(0deg);
            }

            to {

                transform:
                translate(-50%,-50%)
                rotate(360deg);
            }
        }

        /* RESPONSIVE */

        @media(max-width:768px){

            .Para_Mamá {

                font-size: 2rem;

                padding: 0 20px;
            }

            .photo-frame {

                width: 220px;
                height: 300px;

                top: 38%;
            }

            .flower {

                width: 110px;
                height: 220px;
            }

            .flower-container {

                gap: 10px;
            }
        }

        /* BOTON CARTA */

.btn-carta{

    position:absolute;

    top:58%;
    left:50%;

    transform:translateX(-50%);

    padding:18px 35px;

    border-radius:20px;

    text-decoration:none;

    color:white;

    font-size:1.2rem;
    font-weight:bold;

    z-index:999;

    background:
    linear-gradient(
    45deg,
    #ff4da6,
    #ff66cc);

    box-shadow:
    0 0 20px #ff4da6,
    0 0 50px rgba(255,0,128,0.5);

    transition:.4s;

    animation:
    pulseBtn 2s infinite;
}

.btn-carta:hover{

    transform:
    translateX(-50%)
    scale(1.08);

    box-shadow:
    0 0 35px #ff66cc,
    0 0 80px rgba(255,0,180,0.8);
}

@keyframes pulseBtn{

    0%,100%{

        transform:
        translateX(-50%)
        scale(1);
    }

    50%{

        transform:
        translateX(-50%)
        scale(1.05);
    }
}

    </style>

</head>

<body>

    <!-- ESPACIO -->
    <div class="space-bg">

        <div class="nebula nebula1"></div>
        <div class="nebula nebula2"></div>
        <div class="nebula nebula3"></div>

        <div class="galaxy"></div>

        <div id="shooting-stars"></div>

    </div>

    <!-- MUSICA -->
    <audio autoplay loop id="bg-music">
        <source src="mamita-.mp3" type="audio/mp3">
    </audio>

    <!-- ESTRELLAS -->
    <div class="stars" id="star-field"></div>

    <!-- PARTICULAS -->
    <div id="particles"></div>

    <div class="container">

        <!-- TITULO -->
        <h1 class="Para_Mamá">
            Para mi mamita Gianina💖

        </h1>
        

        <!-- FOTO -->
        <div class="photo-frame">

            <div class="photo-glow"></div>

            <!-- SLIDESHOW -->
            <img id="slideshow"
            src="mamitagianina1.jpeg"
            alt="Mi mamá">

        </div>

        <!-- FLORES -->
        <div class="garden">

            <div class="flower-container"
            id="flowers"></div>

        </div>

        <!-- PASTO -->
        <div class="grass" id="grass"></div>

        <!-- BOTON CARTA -->
             <a href="carta.html" class="btn-carta">
                💌 Mamita, tengo algo que decirte...
             </a>

    </div>

    

    <script>

        /* ACTIVAR MUSICA */

        document.addEventListener("click", () => {

            const music =
            document.getElementById("bg-music");

            music.play();

        }, { once:true });

        /* SLIDESHOW */

        const photos = [

            "mamitagianina1.jpeg",
            "mamitagianina2.jpeg",
            "mamitagianina3.jpeg",
            "mamitagianina4.jpeg",
            "mamitagianina5.jpeg",
            "mamitagianina6.jpeg",
            "mamitagianina7.jpeg",
            "mamitagianina8.jpeg",
            "mamitagianina9.jpeg",
            "mamitagianina10.jpeg"

        ];

        let currentPhoto = 0;

        const slideshow =
        document.getElementById("slideshow");

        setInterval(() => {

            slideshow.style.opacity = 0;

            setTimeout(() => {

                currentPhoto++;

                if(currentPhoto >= photos.length){

                    currentPhoto = 0;
                }

                slideshow.src =
                photos[currentPhoto];

                slideshow.style.opacity = 1;

            },1000);

        },5000);

        /* FLOR SVG */

        const flowerSVG = `
        <svg viewBox="0 0 200 400">

            <path d="M100 380 Q105 250 100 120"
            stroke="#39ff5a"
            stroke-width="8"
            fill="none"
            stroke-linecap="round"
            filter="url(#greenGlow)" />

            <ellipse cx="75" cy="250"
            rx="30" ry="15"
            fill="#1eff66"
            transform="rotate(-30 75 250)" />

            <ellipse cx="125" cy="220"
            rx="30" ry="15"
            fill="#1eff66"
            transform="rotate(30 125 220)" />

            <ellipse cx="80" cy="180"
            rx="25" ry="12"
            fill="#1eff66"
            transform="rotate(-20 80 180)" />

            <ellipse cx="100" cy="90"
            rx="26" ry="55"
            fill="#ff4da6" />

            <ellipse cx="70" cy="115"
            rx="24" ry="48"
            fill="#ff66b3"
            transform="rotate(-40 70 115)" />

            <ellipse cx="130" cy="115"
            rx="24" ry="48"
            fill="#ff66b3"
            transform="rotate(40 130 115)" />

            <ellipse cx="85" cy="70"
            rx="20" ry="42"
            fill="#ff80bf"
            transform="rotate(-15 85 70)" />

            <ellipse cx="115" cy="70"
            rx="20" ry="42"
            fill="#ff80bf"
            transform="rotate(15 115 70)" />

            <circle cx="100" cy="110"
            r="15"
            fill="#fff5cc"
            filter="url(#pinkGlow)" />

        </svg>
        `;

        function init(){

            const field =
            document.getElementById('star-field');

            const flowers =
            document.getElementById('flowers');

            const grass =
            document.getElementById('grass');

            const particles =
            document.getElementById('particles');

            /* ESTRELLAS */

            for(let i=0;i<160;i++){

                const star =
                document.createElement('div');

                star.className='star';

                const size =
                Math.random()*3 + 'px';

                star.style.width=size;
                star.style.height=size;

                star.style.top=
                Math.random()*100+'%';

                star.style.left=
                Math.random()*100+'%';

                star.style.setProperty(
                '--duration',
                (Math.random()*3+2)+'s'
                );

                field.appendChild(star);
            }

            /* FLORES */

            for(let i=0;i<3;i++){

                const flower =
                document.createElement('div');

                flower.className='flower';

                flower.innerHTML=flowerSVG;

                flower.style.animationDelay=
                (i*0.8)+'s';

                flowers.appendChild(flower);
            }

            /* PASTO */

            for(let i=0;i<45;i++){

                const blade =
                document.createElement('div');

                blade.className='blade';

                blade.style.left=
                Math.random()*100+'%';

                blade.style.height=
                (80 + Math.random()*120)+'px';

                blade.style.transform=
                `rotate(${Math.random()*30-15}deg)`;

                blade.style.animationDelay=
                (Math.random()*3)+'s';

                grass.appendChild(blade);
            }

            /* PARTICULAS */

            for(let i=0;i<40;i++){

                const p =
                document.createElement('div');

                p.className='particle';

                p.style.left=
                Math.random()*100+'vw';

                p.style.bottom='0';

                p.style.animationDuration=
                (Math.random()*5+4)+'s';

                p.style.animationDelay=
                (Math.random()*5)+'s';

                particles.appendChild(p);
            }
        }

        /* CORAZONES */

        function createHearts(){

            const heart =
            document.createElement('div');

            heart.className='heart';

            heart.innerHTML='❤';

            heart.style.left=
            Math.random()*100+'vw';

            heart.style.bottom='-20px';

            heart.style.fontSize=
            (Math.random()*20+15)+'px';

            heart.style.animationDuration=
            (Math.random()*3+4)+'s';

            document.body.appendChild(heart);

            setTimeout(() => {

                heart.remove();

            },6000);
        }

        setInterval(createHearts,400);

        /* ESTRELLAS FUGACES */

        const shootingContainer =
        document.getElementById("shooting-stars");

        function createShootingStar(){

            const star =
            document.createElement("div");

            star.className =
            "shooting-star";

            star.style.top =
            Math.random()*40+"vh";

            star.style.left =
            (80 + Math.random()*20)+"vw";

            star.style.animationDuration =
            (Math.random()*2+2)+"s";

            shootingContainer.appendChild(star);

            setTimeout(() => {

                star.remove();

            },4000);
        }

        setInterval(createShootingStar,2500);

        init();

    </script>

</body>

</html>
